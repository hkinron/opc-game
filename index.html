<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Pixel Agents</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden}
#header{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 16px;background:#16213e;border-bottom:2px solid #0f3460;z-index:10}
#header h1{font-size:18px;color:#e94560}
#header h1 span{color:#fff}
#controls{display:flex;gap:8px}
#controls button{background:#0f3460;color:#e0e0e0;border:1px solid #533483;padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s}
#controls button:hover{background:#533483;border-color:#e94560}
#game-container{position:relative;flex:1;display:flex;justify-content:center;align-items:center;width:100%}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;border:2px solid #0f3460}
#status-bar{position:fixed;bottom:0;left:0;right:0;background:#16213e;border-top:2px solid #0f3460;padding:6px 16px;font-size:12px;display:flex;gap:20px;z-index:10;flex-wrap:wrap}
.agent-status{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
.status-dot.idle{background:#94a3b8}
.status-dot.working{background:#4ade80}
.status-dot.waiting{background:#fbbf24}
.status-dot.error{background:#ef4444}
#tooltip{position:fixed;background:#16213eee;border:1px solid #533483;border-radius:6px;padding:8px 12px;font-size:12px;pointer-events:none;display:none;z-index:100;max-width:220px}
</style>
  <script type="module" crossorigin src="/opc-game/assets/index-Drg9d_f8.js"></script>
</head>
<body>
<div id="header"><h1>⚡ <span>像素打工人</span></h1><div id="controls"><button id="btn-add">➕ 加人</button><button id="btn-kanban">📋 看板</button><button id="btn-reset">🔄 重来</button></div></div>
<div id="game-container"><canvas id="game"></canvas></div>
<div id="status-bar"></div>
<div id="tooltip"></div>
</body>
</html>
